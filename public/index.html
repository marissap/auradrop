<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraDrop</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Geist Mono', monospace;
            font-size: 14px;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: #fff;
            color: #111;
        }

        :root {
            --green: #4ed037;
            --blue: #00d9ff;
            --green-glow: rgba(57, 255, 20, 0.4);
            --blue-glow: rgba(0, 229, 255, 0.4);
        }

        #app {
            display: grid;
            grid-template-rows: 40px 1fr;
            height: 100vh;
        }

        #columns {
            display: grid;
            grid-template-columns: 1fr 2fr;
            height: 100%;
            overflow: hidden;
        }

        #left {
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        #right {
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            border-bottom: 1px solid #ddd;
            height: 40px;
        }

        section {
            border-bottom: 1px solid #ddd;
            padding: 10px 12px;
        }

        container {
            display: flex;
            align-items: center;
            gap: 8px
        }

        h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #999;
            margin-bottom: 8px;
        }

        input {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 6px 8px;
            outline: none;
            width: 100%;
        }

        input:focus {
            border-color: #111;
        }

        button {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 6px 10px;
            background: #fff;
            cursor: pointer;
            white-space: nowrap;
        }

        button:hover {
            background: #f5f5f5;
        }

        button.p {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        button.p:focus {
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.4);
        }

        button.p:hover {
            opacity: .8;
            background: #111;
        }

        button.p:disabled {
            opacity: .3;
            cursor: not-allowed;
        }

        button.d:hover {
            border-color: #dc2626;
            color: #dc2626;
            background: #fff;
        }

        .row {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 4px;
            border-radius: 4px;
        }

        .item:hover {
            background: #f5f5f5;
        }

        .item .item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item .item-actions {
            display: none;
            gap: 4px;
        }

        .item:hover .item-actions {
            display: flex;
        }

        .tag {
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 1px 5px;
            color: #999;
        }

        .tag.live {
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 6px rgba(57, 255, 20, 0.4);
        }

        .tag.b {
            border-color: var(--blue);
            color: var(--blue);
        }

        .muted {
            color: #999;
            font-size: 11px;
        }

        #setup {
            position: fixed;
            inset: 0;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9;
        }

        .setup-layout {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .setup-layout h2 {
            font-size: 16px;
            font-weight: 500;
        }

        .setup-layout p {
            color: #999;
            font-size: 11px;
            margin-top: -4px;
        }

        label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #999;
            display: block;
            margin-bottom: 4px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #idle {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ddd;
        }

        #session {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        #session.on {
            display: flex;
            border-left: 2px solid #00e5ff;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-meta {
            font-size: 10px;
            color: #999;
        }

        .bubble {
            display: inline-block;
            max-width: 70%;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .bubble.me {
            background: #111;
            color: #fff;
            border-color: #111;
            align-self: flex-end;
        }

        .bubble.ai {
            border-style: dashed;
            max-width: 90%;
        }
/* 
        #ir {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-top: 1px solid #ddd;
            align-items: flex-end;
        } */

        /* #mi {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 6px 8px;
            resize: none;
            height: 34px;
            max-height: 100px;
            outline: none;
            line-height: 1.4;
        }

        #mi:focus {
            border-color: #111;
        } */

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .3);
            align-items: flex-end;
            justify-content: center;
            z-index: 99;
        }

        .overlay.on {
            display: flex;
        }

        .overlay-inner {
            background: #fff;
            border-radius: 8px 8px 0 0;
            padding: 20px;
            width: 100%;
            max-width: 360px;
        }

        /* .sb {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        } */

        #toasts {
            position: fixed;
            top: 48px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 999;
            pointer-events: none;
        }

        .toast {
            padding: 7px 11px;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 11px;
            animation: ti .2s ease,
            to .2s 3.5s ease forwards;
        }

        .toast.ok {
            border-color: var(--green);
            color: var(--green);
        }

        .toast.err {
            border-color: #dc2626;
            color: #dc2626;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
        }

        .card.c {
            border-color: #00e5ff;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
        }

        .card-name {
            font-weight: 500;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-status {
            color: #999;
            font-size: 11px;
            margin-bottom: 8px;
            min-height: 16px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div id="setup">
        <div class="setup-layout">
            <div>
                <h2>auradrop</h2>
                <p>collab with nearby friends :)</p>
            </div>
            <div class="field"><label>name</label><input id="input-name" type="text" placeholder="your name"
                    maxlength="24" autocomplete="off"></div>
            <div class="field">
                <label>phone number</label>
                <input id="input-phone" type="tel" placeholder="+1 555 000 0000">
                <span class="muted" id="hash-hint" style="margin-top: 3px"></span>
            </div>
            <div class="field"><label>status (optional)</label><input id="input-status" type="text"
                    placeholder="at the coffee shop" maxlength="40"></div>
            <button class="primary" id="enter-btn" disabled onclick="doSetup()">enter auradrop →</button>
        </div>
    </div>

    <div id="app">
        <nav>
            <div class="container">
                <b>auradrop</b>
                <span class="tag" id="conn-tag">offline</span>
            </div>
            <div class="container">
                <span class="tag" id="geohash-tag">—</span>
                <span class="muted" id="user-name">—</span>
            </div>
        </nav>
        <div id="columns">
            <div id="left">
                <section>
                    <h3>contacts <span class="muted" id="contact-count">(0)</span></h3>
                    <div class="row">
                        <input id="input-contact" type="tel" placeholder="+1 555 000 0000"
                            onkeydown="if(event.key==='Enter') addContact()">
                        <button onclick="addContact()">add</button>
                    </div>
                    <div id="contact-list"></div>
                </section>
                <section style="border-bottom:none">
                    <h3>nearby <span class="muted" id="nearby-count">(0)</span></h3>
                    <div class="grid" id="nearby"><span class="muted" style="grid-column:1/-1">searching for
                            friends...</span></div>
                </section>
            </div>
            <div id="right">
                <div id="idle">
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
                        <div style="font-size: 48px; transform: rotate(60deg); transform-origin: center;">✦</div>
                        <div>no active session</div>
                    </div>
                    <div id="session">
                        <div id="session-header">
                            <b id="session-name">—</b>
                            <div class="container">
                                <span class="tag" id="session-count">—</span>
                                <button onclick="endSession()">end</button>
                            </div>
                        </div>
                        <div id="messages"></div>
                        <div id="input-row">
                            <textarea id="msg-input" placeholder="message… or @ai for AI"
                                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
                                oninput="this.style.height='';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
                            <button class="primary" onclick="sendMsg()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="overlay" id="file-overlay">
            <div class="overlay-inner">
                <strong id="offer-filename">file.zip</strong><small id="offer-info">0 KB</small>
                <div class="sheet-btns"><button class="primary" onclick="acceptOffer()">accept</button><button
                        onclick="rejectOffer()">decline</button></div>
            </div>
        </div>

        <div class="overlay" id="invite-overlay">
            <div class="overlay-inner">
                <strong id="invite-from">someone</strong><small>wants to start a session</small>
                <div class="sheet-btns"><button class="primary" onclick="acceptInvite()">join</button><button
                        onclick="rejectInvite()">decline</button></div>
            </div>
        </div>

        <div class="overlay" id="nearby-overlay">
            <div class="overlay-inner">
                <strong id="nearby-who">someone</strong><small> is nearby</small>
                <div class="sheet-btns"><button class="primary" onclick="startWithNearby()">start session</button>
                    <button onclick="overlay('nearby-overlay',0)">dismiss</button>
                </div>
            </div>
        </div>

        <div id="toasts"></div>

        <script>
            const WORKER_URL = "https://auradrop.marissaphul.workers.dev";
            const WS_URL = WORKER_URL.replace(/^https/, "wss").replace(/^http/, "ws");

            let myHash;
            let myName;
            let myStatus;
            let myLat;
            let myLng;
            let currentGeohash;
            let contacts = [];
            let peers = [];
            let agentState = {};
            let cellWs;
            let agentWs;
            let sessionWs;
            let peerName;
            let peerHash;
            let aiEl;
            let aiBuffer = "";
            let inbound = {};
            let pendingHash;
            let pendingName;

            async function hashPhone(phone) {
                const n = phone.replace(/\D/g, ""); if (n.length < 7) return null;
                const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(n));
                return [...new Uint8Array(b)].slice(0, 8).map(x => x.toString(16).padStart(2, "0")).join("");
            }

            document.getElementById("input-name").oninput = checkReady;
            document.getElementById("input-phone").oninput = async e => {
                const h = await hashPhone(e.target.value);
                document.getElementById("hash-hint").textContent = h ? `→ ${h}` : "";
                checkReady();
            };
            function checkReady() {
                document.getElementById("enter-btn").disabled =
                    !(document.getElementById("input-name").value.trim() &&
                        document.getElementById("input-phone").value.replace(/\D/g, "").length >= 7);
            }

            async function doSetup() {
                myName = document.getElementById("input-name").value.trim();
                myStatus = document.getElementById("input-status").value.trim();
                myHash = await hashPhone(document.getElementById("input-phone").value);
                if (!myHash) return;
                document.getElementById("setup").style.display = "none";
                document.getElementById("user-name").textContent = myName;
                connectAgent();
                navigator.geolocation
                    ? navigator.geolocation.getCurrentPosition(
                        p => { myLat = p.coords.latitude; myLng = p.coords.longitude; onLocation(); },
                        () => toast("GPS denied", "err"), { enableHighAccuracy: true, timeout: 8000 })
                    : toast("GPS not supported", "err");
            }

            function geohash(lat, lng, p = 5) {
                const B = "0123456789bcdefghjkmnpqrstuvwxyz";
                let i = 0, b = 0, e = true, s = "", la = -90, lb = 90, lo = -180, lp = 180;
                while (s.length < p) {
                    if (e) { const m = (lo + lp) / 2; lng >= m ? (i = i * 2 + 1, lo = m) : (i *= 2, lp = m); }
                    else { const m = (la + lb) / 2; lat >= m ? (i = i * 2 + 1, la = m) : (i *= 2, lb = m); }
                    e = !e; if (++b === 5) { s += B[i]; b = 0; i = 0; }
                }
                return s;
            }

            function onLocation() {
                const g = geohash(myLat, myLng);
                document.getElementById("geohash-tag").textContent = g;
                if (g !== currentGeohash) { currentGeohash = g; connectGeohashCell(); }
            }

            function connectGeohashCell() {
                cellWs?.close();
                cellWs = new WebSocket(`${WS_URL}/cell?lat=${myLat}&lng=${myLng}&id=${myHash}&name=${encode(myName)}&status=${encode(myStatus)}`);
                cellWs.onopen = () => setConnected(1);
                cellWs.onclose = () => { setConnected(0); peers = []; renderNearby(); setTimeout(connectGeohashCell, 3000); };
                cellWs.onmessage = e => { const m = JSON.parse(e.data); if (m.type === "presence") { peers = m.peers || []; renderNearby(); } };
                setInterval(() => cellWs?.readyState === 1 && cellWs.send(JSON.stringify({ type: "ping", peerId: myHash })), 15000);
            }

            function connectAgent() {
                agentWs = new WebSocket(`${WS_URL}/agent/${myHash}`);
                agentWs.onopen = () => { loadContacts(); saveProfile(); };
                agentWs.onclose = () => setTimeout(connectAgent, 3000);
                agentWs.onmessage = e => {
                    const m = JSON.parse(e.data);
                    if (m.type === "state") onState(m.state);
                    if (m.type === "chunk") onChunk(m);
                    if (m.type === "transfer_complete") onDone(m);
                    if (m.type === "transfer_sent") toast("file sent!", "ok");
                    if (m.type === "offer_declined") toast("declined", "err");
                    if (m.type === "contact_nearby") onNearby(m.hash, m.name);
                    if (m.type === "session_ready") onSessReady(m.sessionId, m.peerName, m.peerHash);
                };
            }

            function connectSession(id) {
                sessionWs?.close();
                sessionWs = new WebSocket(`${WS_URL}/session/${id}?hash=${myHash}&name=${encode(myName)}`);
                sessionWs.onmessage = e => {
                    const m = JSON.parse(e.data);
                    if (m.type === "history") { document.getElementById("messages").innerHTML = ""; m.messages.forEach(addMsg); }
                    if (m.type === "message") addMsg(m.message);
                    if (m.type === "joined" || m.type === "left") {
                        document.getElementById("session-count").textContent = `${m.participants} connected`;
                        toast(`${m.name} ${m.type}`, "ok");
                    }
                    if (m.type === "ai_typing") { aiBuffer = ""; aiEl = makeAIBubble(); }
                    if (m.type === "ai_token") { aiBuffer += m.token; if (aiEl) aiEl.textContent = aiBuffer; scrollMessages(); }
                    if (m.type === "ai_done") { aiEl = null; scrollMessages(); }
                    if (m.type === "ai_error") { toast("AI unavailable", "err"); aiEl?.closest(".msg")?.remove(); aiEl = null; }
                };
            }

            async function loadContacts() {
                try { contacts = await (await fetch(`${WORKER_URL}/agent/${myHash}/contacts`)).json(); renderContacts(); renderNearby(); } catch { }
            }
            async function saveProfile() {
                try { await fetch(`${WORKER_URL}/agent/${myHash}/profile`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ displayName: myName, hashedPhone: myHash, status: myStatus }) }); } catch { }
            }

            async function addContact() {
                const input = document.getElementById("input-contact");
                const hash = await hashPhone(input.value.trim());
                if (!hash) {
                    toast("invalid number", "err");
                    return;
                }
                if (contacts.find(c => c.hashedPhone === hash)) {
                    toast("already added!", "ok");
                    return;
                }
                const name = prompt("name for this contact?");
                if (!name) return;
                try {
                    await fetch(`${WORKER_URL}/agent/${myHash}/contacts`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ hashedPhone: hash, displayName: name })
                    });
                    contacts.push({ hashedPhone: hash, displayName: name });
                    input.value = "";
                    renderContacts();
                    renderNearby();
                    toast(`${name} added!`, "ok");
                } catch {
                    toast("Failed", "err");
                }
            }

            async function removeContact(h) {
                try {
                    await fetch(`${WORKER_URL}/agent/${myHash}/contacts/${h}`, { method: "DELETE" });
                    contacts = contacts.filter(c => c.hashedPhone !== h); renderContacts(); renderNearby();
                } catch { toast("Failed", "err"); }
            }

            function renderContacts() {
                const nearbyHashes = new Set(peers.map(p => p.hashedID));
                document.getElementById("contact-count").textContent = `(${contacts.length})`;
                document.getElementById("contact-list").innerHTML = contacts.length
                    ? contacts.map(c => {
                        const isNearby = nearbyHashes.has(c.hashedPhone);
                        const sessionBtn = isNearby
                            ? `<button onclick="startSession('${c.hashedPhone}','${escapeQuotes(c.displayName)}')">session</button>`
                            : `<span class="muted" style="font-size:11px">not nearby</span>`;
                        return `<div class="item">
          <span class="item-name">${c.displayName}</span>
          ${isNearby ? `<span class="tag" style="border-color:#39ff14;color:#39ff14;font-size:10px">nearby</span>` : ""}
          <div class="item-actions">${sessionBtn}
            <button class="danger" onclick="removeContact('${c.hashedPhone}')">×</button>
          </div>
        </div>`;
                    }).join("")
                    : `<span class="muted">No contacts yet.</span>`;
            }

            function renderNearby() {
                const cs = new Set(contacts.map(c => c.hashedPhone));
                const v = peers.filter(p => p.hashedID !== myHash);
                document.getElementById("nearby-count").textContent = `(${v.length})`;
                document.getElementById("nearby").innerHTML = v.length
                    ? v.map(p => `<div class="card ${cs.has(p.hashedID) ? "c" : ""}">
        <div class="card-name">${p.displayName}</div>
        <div class="card-status">${p.status || ""}</div>
        <button style="width:100%" onclick="startSession('${p.hashedID}','${escapeQuotes(p.displayName)}')">session</button>
      </div>`).join("")
                    : `<span class="muted" style="grid-column:1/-1">Searching…</span>`;
            }

            function startSession(hash, name) {
                peerHash = hash; peerName = name;
                agentWs.send(JSON.stringify({ type: "invite_session", targetHash: hash, myHash, myName }));
                toast(`Invite sent to ${name}…`, "ok");
            }

            function onSessReady(id, pN, pH) {
                peerName = pN || peerName; peerHash = pH || peerHash;
                connectSession(id);
                document.getElementById("session-name").textContent = peerName;
                document.getElementById("messages").innerHTML = "";
                document.getElementById("idle").style.display = "none";
                document.getElementById("sess").className = "on";
            }

            function endSession() {
                sessionWs?.close(); sessionWs = null;
                document.getElementById("sess").className = "";
                document.getElementById("idle").style.display = "";
                agentWs.send(JSON.stringify({ type: "reject_session" }));
            }

            function sendMsg() {
                const inp = document.getElementById("msg-input");
                const text = inp.value.trim();
                if (!text || sessionWs?.readyState !== 1) return;
                sessionWs.send(JSON.stringify({ type: "message", text }));
                inp.value = ""; inp.style.height = "";
            }

            function addMsg(msg) {
                const isMe = msg.fromHash === myHash;
                const isAI = msg.fromHash === "ai";
                const div = document.createElement("div");
                div.className = "msg";
                div.innerHTML = `<div class="msg-meta">${isMe ? "You" : msg.fromName} · ${new Date(msg.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
    <div class="bubble ${isMe ? "me" : isAI ? "ai" : ""}">${safeHtml(msg.content)}</div>`;
                document.getElementById("messages").appendChild(d);
                scrollMessages();
            }

            function makeAIBubble() {
                const div = document.createElement("div");
                div.className = "msg";
                div.innerHTML = `<div class="msg-meta">AI · now</div><div class="bubble ai"></div>`;
                document.getElementById("messages").appendChild(div);
                scrollMessages();
                return dov.querySelector(".bubble");
            }

            function onState(state) {
                if (state.status === "receiving" && state.incomingOffer) {
                    document.getElementById("offer-filename").textContent = state.incomingOffer.fileName;
                    document.getElementById("offer-info").textContent = `${formatBytes(state.incomingOffer.fileSize)} · from ${state.incomingOffer.fromName || state.incomingOffer.fromHash.slice(0, 8)}`;
                    overlay("file-overlay", 1);
                }
                if (state.status === "idle") {
                    overlay("file-overlay", 0);
                }
                if (state.incomingSession) {
                    document.getElementById("invite-from").textContent = state.incomingSession.fromName;
                    overlay("invite-overlay", 1);
                }
            }

            function acceptOffer() {
                const o = agentState.incomingOffer;
                if (!o) return;
                overlay("file-overlay", 0);
                agentWs.send(JSON.stringify({ type: "accept_drop", transferId: o.transferId, fromAgentId: o.fromHash }));
            }

            function rejectOffer() {
                overlay("file-overlay", 0);
                agentWs.send(JSON.stringify({ type: "reject_drop" }));
            }

            function onChunk({ index, data, fileName, transferId }) {
                if (!inbound[transferId]) inbound[transferId] = { chunks: [], fileName };
                inbound[transferId].chunks[index] = Uint8Array.from(atob(data), c => c.charCodeAt(0));
            }

            function onDone({ transferId, fileName }) {
                const transfer = inbound[transferId]; if (!transfer) return;
                const assignTransfer = Object.assign(document.createElement("a"), {
                    href: URL.createObjectURL(new Blob(transfer.chunks)),
                    download: transfer.fileName || fileName
                });
                document.body.appendChild(assignTransfer);
                assignTransfer.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(a.href), 5000);
                delete inbound[transferId];
                toast(`${t.fileName} saved`, "ok");
            }

            function acceptInvite() {
                overlay("invite-overlay", 0);
                agentWs.send(JSON.stringify({ type: "accept_session", sessionId: agentState.incomingSession?.sessionId }));
            }
            function rejectInvite() { overlay("invite-overlay", 0); agentWs.send(JSON.stringify({ type: "reject_session" })); }

            function onNearby(hash, name) {
                pendingHash = hash; pendingName = name;
                document.getElementById("nearby-who").textContent = name;
                overlay("nearby-overlay", 1);
            }
            function startWithNearby() { overlay("nearby-overlay", 0); pendingHash && startSession(pendingHash, pendingName); }

            function setConnected(on) {
                const connection = document.getElementById("conn-tag");
                connection.textContent = on ? "live" : "offline"; connection.className = "tag" + (on ? " live" : "");
            }

            function overlay(id, on) {
                document.getElementById(id).classList[on ? "add" : "remove"]("on");
            }

            function scrollMessages() {
                const messages = document.getElementById("messages");
                messages.scrollTop = messages.scrollHeight;
            }

            function toast(msg, type) {
                const el = Object.assign(document.createElement("div"), { className: `toast ${type}`, textContent: msg });
                document.getElementById("toasts").appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }

            function formatBytes(b) { return b < 1024 ? `${b}B` : b < 1048576 ? `${(b / 1024).toFixed(1)}KB` : `${(b / 1048576).toFixed(1)}MB`; }
            function encode(s) { return encodeURIComponent(s); }
            function escapeQuotes(s) { return s.replace(/'/g, "\\'"); }
            function safeHtml(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>"); }
        </script>
</body>

</html>

    <script>
        const WORKER_URL = "https://auradrop.marissaphul.workers.dev";
        const WS_URL = WORKER_URL.replace("https://", "wss://").replace("http://", "ws://");

        // so many variables to track i hate that this is messy
        let myHash = null;
        let myName = "";
        let cellWs = null;
        let agentWs = null;
        let nearbyPeers = [];
        let selectedFile = null;
        let incomingOffer = null;
        let inboundChunks = {};
        let watchId = null;
        let currentGeohash = null;
        let lat = null;
        let lang = null;
        let sessionWs = null;
        let currentSessionId = null;
        let aiBuffer = "";
        let contacts = [];
        let myStatus = "";
        let agentState = { status: "idle", incomingOffer: null, activeTransfer: null, incomingSession: null };
        let sessionPeerName = "";
        let sessionPeerHash = "";
        let pendingNearbyHash = null;
        let pendingNearbyName = null;
        let offerTimeout = null;

        // ALL THE SETUP FUNCTIONS
        async function hashPhone(phone) {
            const clean = phone.replace(/\D/g, "");
            if (clean.length < 7) return null;
            const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(clean));
            return Array.from(new Uint8Array(buf)).slice(0, 8)
                .map(b => b.toString(16).padStart(2, "0")).join("");
        }

        document.getElementById("input-phone").addEventListener("input", async (e) => {
            const hash = await hashPhone(e.target.value);
            const hash_text = document.getElementById("hash");
            hash_text.textContent = hash ? `→ ${hash}` : "";
            hash_text.className = "hash" + (hash ? " ready" : "");
            checkSetupReady();
        });

        document.getElementById("input-name").addEventListener("input", checkSetupReady);

        function checkSetupReady() {
            const name = document.getElementById("input-name").value.trim();
            const phone = document.getElementById("input-phone").value;
            document.getElementById("btn-go").disabled =
                !(name.length > 0 && phone.replace(/\D/g, "").length >= 7);
        }

        async function loadProfile() {
            const res = await fetch(`${WORKER_URL}/agent/${myHash}/profile`);
            const profile = await res.json();
            if (profile) {
                myName = profile.displayName;
                myStatus = profile.status ?? "";
                document.getElementById("input-name").value = myName;
            }

            const cRes = await fetch(`${WORKER_URL}/agent/${myHash}/contacts`);
            contacts = await cRes.json();
        }

        async function saveProfile() {
            await fetch(`${WORKER_URL}/agent/${myHash}/profile`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ displayName: myName, hashedPhone: myHash, status: myStatus }),
            });
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
        }

        async function startSession() {
            myName = document.getElementById("input-name").value.trim();
            myStatus = document.getElementById("input-status").value.trim();
            const phone = document.getElementById("input-phone").value;
            myHash = await hashPhone(phone);
            if (!myHash) return;

            document.getElementById("setup-overlay").classList.add("hidden");
            document.getElementById("user-name-display").textContent = myName;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        myLat = pos.coords.latitude;
                        myLng = pos.coords.longitude;
                        onLocation(myLat, myLng);
                        connectAgent();
                    },
                    () => { toast("GPS denied — proximity unavailable", "error"); },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                toast("GPS not supported", "error");
            }
        }

        // LOCATION STUFF
        function onLocation(lat, lng) {
            const geohash = encodeGeohash(lat, lng);

            if (currentGeohash !== geohash) {
                currentGeohash = geohash;
                connectCell(lat, lng);
            }
        }

        function encodeGeohash(lat, lng, precision = 5) {
            const BASE32 = "0123456789bcdefghjkmnpqrstuvwxyz";
            let idx = 0, bit = 0, evenBit = true, geohash = "";
            let [latMin, latMax, lngMin, lngMax] = [-90, 90, -180, 180];
            while (geohash.length < precision) {
                if (evenBit) {
                    const m = (lngMin + lngMax) / 2;
                    lng >= m ? (idx = idx * 2 + 1, lngMin = m) : (idx *= 2, lngMax = m);
                } else {
                    const m = (latMin + latMax) / 2;
                    lat >= m ? (idx = idx * 2 + 1, latMin = m) : (idx *= 2, latMax = m);
                }
                evenBit = !evenBit;
                if (++bit === 5) { geohash += BASE32[idx]; bit = 0; idx = 0; }
            }
            return geohash;
        }


        function connectCell(lat, lng) {
            if (cellWs) cellWs.close();

            cellWs = new WebSocket(`${WS_URL}/cell?lat=${lat}&lng=${lng}&id=${myHash}&name=${encodeURIComponent(myName)}&status=${encodeURIComponent(myStatus)}`);

            cellWs.onopen = () => {
                // sendCellUpdate();
                setConnected(true);
            };

            cellWs.onmessage = (evt) => {
                const msg = JSON.parse(evt.data);
                if (msg.type === "presence") {
                    nearbyPeers = msg.peers || [];
                    renderNearby();
                }
            };
            cellWs.onclose = () => {
                setConnected(false);
                nearbyPeers = [];
                renderNearby();
                setTimeout(() => { if (myLat) connectCell(myLat, myLng); }, 3000);
            };
            cellWs.onerror = () => setConnected(false);

            setInterval(() => {
                if (cellWs?.readyState === WebSocket.OPEN)
                    cellWs.send(JSON.stringify({ type: "ping", peerId: myHash }));
            }, 15000);
        }

        // function sendCellUpdate() {
        //     if (lat === null || long === null) {
        //         toast("No GPS coords found — try again", "error");
        //         showScreen("setup");
        //     };
        //     cellWs.send(JSON.stringify({
        //         type: "join",
        //         hashedID: myHash,
        //         lat: lat,
        //         lng: long,
        //         displayName: myName,
        //     }));
        // }

        // AGENT
        function connectAgent() {
            console.log("connectAgent called")
            agentWs = new WebSocket(`${WS_URL}/agent/${myHash}`);
            agentWs.onopen = () => {
                loadContacts();
                saveProfile();
            };
            agentWs.onmessage = (evt) => {
                const msg = JSON.parse(evt.data);
                if (msg.type === "state") handleAgentState(msg.state);
                if (msg.type === "chunk") handleChunk(msg);
                if (msg.type === "transfer_complete") handleTransferComplete(msg);
                if (msg.type === "transfer_sent") handleTransferSent();
                if (msg.type === "offer_declined") handleOfferDeclined();
                if (msg.type === "contact_nearby") handleContactNearby(msg.hash, msg.name);
                if (msg.type === "session_ready") handleSessionReady(msg.sessionId, msg.peerName, msg.peerHash);
            };
            agentWs.onclose = () => setTimeout(connectAgent, 3000);
        }

        async function loadContacts() {
            try {
                const res = await fetch(`${WORKER_URL}/agent/${myHash}/contacts`);
                contacts = await res.json();
                renderContacts();
                renderNearby();
            } catch { }
        }

        async function saveProfile() {
            try {
                await fetch(`${WORKER_URL}/agent/${myHash}/profile`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ displayName: myName, hashedPhone: myHash, status: myStatus }),
                });
            } catch { }
        }

        // CONTACTS
        async function addContact() {
            const input = document.getElementById("add-contact-input");
            const phone = input.value.trim();
            if (!phone) return;
            const hash = await hashPhone(phone);
            if (!hash) { toast("Invalid phone number", "error"); return; }
            if (contacts.find(c => c.hashedPhone === hash)) { toast("Already added", "info"); return; }

            const name = prompt(`Display name for ${phone}?`);
            if (!name) return;

            try {
                await fetch(`${WORKER_URL}/agent/${myHash}/contacts`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ hashedPhone: hash, displayName: name }),
                });
                contacts.push({ hashedPhone: hash, displayName: name });
                input.value = "";
                renderContacts();
                renderNearby();
                toast(`${name} added`, "success");
            } catch { toast("Failed to add contact", "error"); }
        }

        async function removeContact(hash) {
            try {
                await fetch(`${WORKER_URL}/agent/${myHash}/contacts/${hash}`, { method: "DELETE" });
                contacts = contacts.filter(c => c.hashedPhone !== hash);
                renderContacts();
                renderNearby();
                toast("Contact removed", "info");
            } catch { toast("Failed to remove", "error"); }
        }

        function renderContacts() {
            const list = document.getElementById("contacts-list");
            document.getElementById("contacts-count").textContent = contacts.length;
            const colors = ["av-gold", "av-green", "av-blue", "av-red"];

            if (contacts.length === 0) {
                list.innerHTML = `<div class="empty-state">No contacts yet.<br>Add a phone number above.</div>`;
                return;
            }

            list.innerHTML = contacts.map((c, i) => `
    <div class="contact-row">
      <div class="contact-avatar ${colors[i % 4]}">${c.displayName.slice(0, 1).toUpperCase()}</div>
      <div class="contact-info">
        <div class="contact-name">${c.displayName}</div>
        <div class="contact-hash">${c.hashedPhone.slice(0, 8)}…</div>
      </div>
      <div class="contact-actions">
        <button class="btn-icon session" onclick="initiateSession('${c.hashedPhone}','${c.displayName.replace(/'/g, "\\'")}')">session</button>
        <button class="btn-icon danger" onclick="removeContact('${c.hashedPhone}')">×</button>
      </div>
    </div>
  `).join("");
        }

        // PROXIMITY AND NEARBY FUNCTIONALITY
        function renderNearby() {
            const grid = document.getElementById("nearby-grid");
            document.getElementById("nearby-count").textContent = nearbyPeers.length;
            const contactHashes = new Set(contacts.map(c => c.hashedPhone));

            if (nearbyPeers.length === 0) {
                grid.innerHTML = `<div class="nearby-empty">📡<br>Searching for<br>people in your cell…</div>`;
                return;
            }

            grid.innerHTML = nearbyPeers
                .filter(p => p.hashedID !== myHash)
                .map(p => {
                    const isContact = contactHashes.has(p.hashedID);
                    const initials = p.displayName.slice(0, 2).toUpperCase();
                    return `
        <div class="nearby-card ${isContact ? "is-contact" : ""}">
          ${isContact ? `<div class="nearby-card-badge">contact</div>` : ""}
          <div class="nearby-card-avatar">${initials}</div>
          <div class="nearby-card-name">${p.displayName}</div>
          <div class="nearby-card-status">${p.status || ""}</div>
          <div class="nearby-card-actions">
            <button class="btn-icon session" onclick="initiateSession('${p.hashedID}','${p.displayName.replace(/'/g, "\\'")}')">session</button>
          </div>
        </div>
      `;
                }).join("");
        }

        // ALL OF THE SESSION STUFF
        // SESSION MANAGEMENT
        function initiateSession(targetHash, targetName) {
            sessionPeerName = targetName;
            sessionPeerHash = targetHash;
            agentWs.send(JSON.stringify({
                type: "invite_session",
                targetHash,
                myHash,
                myName,
            }));
            toast(`Session invite sent to ${targetName}…`, "info");
        }

        function handleSessionReady(sessionId, peerName, peerHash) {
            currentSessionId = sessionId;
            sessionPeerName = peerName || sessionPeerName;
            sessionPeerHash = peerHash || sessionPeerHash;
            connectSession(sessionId);
            openSessionPanel(sessionPeerName);
        }

        function openSessionPanel(peerName) {
            document.getElementById("session-idle").classList.add("hidden");
            document.getElementById("session-active").classList.add("visible");
            document.getElementById("session-peer-name").textContent = peerName;
            document.getElementById("session-peer-avatar").textContent = peerName.slice(0, 1).toUpperCase();
            document.getElementById("messages-wrap").innerHTML = "";
        }

        function endSession() {
            if (sessionWs) sessionWs.close();
            sessionWs = null;
            currentSessionId = null;
            document.getElementById("session-active").classList.remove("visible");
            document.getElementById("session-idle").classList.remove("hidden");
            agentWs.send(JSON.stringify({ type: "reject_session" }));
        }

        // SESSION INVITES
        function handleContactNearby(hash, name) {
            pendingNearbyHash = hash;
            pendingNearbyName = name;
            document.getElementById("nearby-contact-name").textContent = name;
            document.getElementById("nearby-contact-sub").textContent = "just entered your proximity cell";
            document.getElementById("contact-nearby-overlay").classList.add("visible");
        }

        function startSessionWithNearby() {
            document.getElementById("contact-nearby-overlay").classList.remove("visible");
            if (pendingNearbyHash) initiateSession(pendingNearbyHash, pendingNearbyName);
        }

        function handleAgentState(state) {
            agentState = state;
            if (state.status === "receiving" && state.incomingOffer) showFileOffer(state.incomingOffer);
            if (state.status === "idle") {
                document.getElementById("file-offer-overlay").classList.remove("visible");
            }
            if (state.incomingSession) showSessionInvite(state.incomingSession);
        }

        function showSessionInvite(invite) {
            document.getElementById("invite-from-name").textContent = invite.fromName;
            document.getElementById("session-invite-overlay").classList.add("visible");
        }

        function acceptSessionInvite() {
            document.getElementById("session-invite-overlay").classList.remove("visible");
            agentWs.send(JSON.stringify({
                type: "accept_session",
                sessionId: agentState.incomingSession?.sessionId,
            }));
        }

        function rejectSessionInvite() {
            document.getElementById("session-invite-overlay").classList.remove("visible");
            agentWs.send(JSON.stringify({ type: "reject_session" }));
        }

        // SESSION WEBSOCKET
        function connectSession(sessionId) {
            if (sessionWs) sessionWs.close();
            sessionWs = new WebSocket(
                `${WS_URL}/session/${sessionId}?hash=${myHash}&name=${encodeURIComponent(myName)}`
            );

            sessionWs.onmessage = (evt) => {
                const msg = JSON.parse(evt.data);

                if (msg.type === "history") {
                    document.getElementById("messages-wrap").innerHTML = "";
                    msg.messages.forEach(m => appendMessage(m));
                }

                if (msg.type === "message") appendMessage(msg.message);

                if (msg.type === "joined" || msg.type === "left") {
                    document.getElementById("session-participants").textContent =
                        `${msg.participants} connected`;
                    toast(`${msg.name} ${msg.type === "joined" ? "joined" : "left"}`, "info");
                }

                if (msg.type === "ai_typing") {
                    aiBuffer = "";
                    aiMsgEl = createAIBubble();
                }

                if (msg.type === "ai_token") {
                    aiBuffer += msg.token;
                    if (aiMsgEl) aiMsgEl.textContent = aiBuffer;
                    scrollMessages();
                }

                if (msg.type === "ai_done") {
                    aiBuffer = "";
                    aiMsgEl = null;
                    scrollMessages();
                }

                if (msg.type === "ai_error") {
                    toast("AI unavailable", "error");
                    if (aiMsgEl) aiMsgEl.closest(".msg-group")?.remove();
                    aiMsgEl = null;
                }
            };
        }

        function sendMessage() {
            const input = document.getElementById("session-input");
            const text = input.value.trim();
            if (!text || !sessionWs || sessionWs.readyState !== WebSocket.OPEN) return;
            sessionWs.send(JSON.stringify({ type: "message", text }));
            input.value = "";
            input.style.height = "40px";
        }

        function handleInputKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = "40px";
            el.style.height = Math.min(el.scrollHeight, 120) + "px";
        }

        // MESSAGING
        function appendMessage(msg) {
            const wrap = document.getElementById("messages-wrap");
            const isMe = msg.fromHash === myHash;
            const isAI = msg.fromHash === "ai";
            const cls = isMe ? "me" : isAI ? "ai" : "them";
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

            const group = document.createElement("div");
            group.className = "msg-group";
            group.innerHTML = `
    <div class="msg-group-header">
      <span class="msg-sender ${cls}">${isMe ? "You" : msg.fromName}</span>
      <span class="msg-time">${time}</span>
    </div>
    <div class="msg-bubble ${cls}">${escHtml(msg.content)}</div>
  `;
            wrap.appendChild(group);
            scrollMessages();
        }

        function createAIBubble() {
            const wrap = document.getElementById("messages-wrap");
            const group = document.createElement("div");
            group.className = "msg-group";
            group.innerHTML = `
    <div class="msg-group-header">
      <span class="msg-sender ai">AI</span>
      <div class="ai-dots">
        <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
      </div>
    </div>
    <div class="msg-bubble ai"></div>
  `;
            wrap.appendChild(group);
            scrollMessages();
            return group.querySelector(".msg-bubble");
        }

        function scrollMessages() {
            const wrap = document.getElementById("messages-wrap");
            wrap.scrollTop = wrap.scrollHeight;
        }

        function escHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
        }

        // FILE TRANSFER
        function showFileOffer(offer) {
            agentState = { ...agentState, incomingOffer: offer };
            document.getElementById("offer-filename").textContent = offer.fileName;
            document.getElementById("offer-meta").textContent =
                `${formatBytes(offer.fileSize)} · from ${offer.fromName || offer.fromHash.slice(0, 8)}`;
            document.getElementById("file-offer-overlay").classList.add("visible");
            if (offerTimeout) clearTimeout(offerTimeout);
            offerTimeout = setTimeout(() => {
                if (agentState.incomingOffer?.transferId === offer.transferId) {
                    rejectOffer();
                    toast("Offer expired", "info");
                }
            }, 60_000);
        }

        function acceptOffer() {
            const offer = agentState.incomingOffer;
            if (!offer) return;
            document.getElementById("file-offer-overlay").classList.remove("visible");
            agentWs.send(JSON.stringify({
                type: "accept_drop",
                transferId: offer.transferId,
                fromAgentId: offer.fromHash,
            }));
        }

        function rejectOffer() {
            document.getElementById("file-offer-overlay").classList.remove("visible");
            agentWs.send(JSON.stringify({ type: "reject_drop" }));
        }

        function handleChunk({ index, data, total, fileName, transferId }) {
            if (!inboundChunks[transferId])
                inboundChunks[transferId] = { chunks: [], fileName, total };
            inboundChunks[transferId].chunks[index] = Uint8Array.from(atob(data), c => c.charCodeAt(0));
        }

        function handleTransferComplete({ transferId, fileName }) {
            const t = inboundChunks[transferId];
            if (!t) return;
            const blob = new Blob(t.chunks, { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = t.fileName || fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
            delete inboundChunks[transferId];
            toast(`✓ ${t.fileName} saved`, "success");
        }

        function handleTransferSent() {
            toast("File sent!", "success");
        }

        function handleOfferDeclined() {
            toast("Transfer declined", "error");
        }

        // HELPERS
        function setConnected(on) {
            const pill = document.getElementById("conn-pill");
            pill.className = "conn-pill" + (on ? " live" : "");
            document.getElementById("conn-label").textContent = on ? "live" : "offline";
        }

        function toggleSection(id) {
            document.getElementById(id).classList.toggle("collapsed");
        }

        function formatBytes(b) {
            if (b < 1024) return `${b} B`;
            if (b < 1048576) return `${(b / 1024).toFixed(1)} KB`;
            return `${(b / 1048576).toFixed(1)} MB`;
        }

        function toast(msg, type = "info") {
            const wrap = document.getElementById("toast-wrap");
            const el = document.createElement("div");
            el.className = `toast ${type}`;
            el.textContent = msg;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>
